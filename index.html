<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Belghamdi Full Body</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --bg4:#222222;
  --lime:#c8f135;
  --lime2:#a8d020;
  --red:#ff3c3c;
  --text:#f0f0f0;
  --text2:#888;
  --border:#2a2a2a;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HEADER */
.header{
  background:linear-gradient(180deg,#111 0%,#0a0a0a 100%);
  border-bottom:1px solid var(--border);
  padding:14px 16px 0;
  position:sticky;top:0;z-index:100;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--lime);text-shadow:0 0 20px rgba(200,241,53,.3);}
.logo span{color:#fff;}
.week-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text2);}

/* PROGRESS */
.progress-wrap{margin-bottom:12px;}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.progress-label{font-size:12px;color:var(--text2);}
.progress-pct{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--lime);}
.progress-bar{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--lime2),var(--lime));border-radius:4px;transition:width .5s ease;}

/* DAY TABS */
.day-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:0;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{
  flex:1;min-width:90px;padding:10px 8px;border-radius:var(--radius) var(--radius) 0 0;
  border:none;border-bottom:3px solid transparent;cursor:pointer;
  background:var(--bg3);color:var(--text2);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;
  transition:all .2s;white-space:nowrap;
}
.day-tab.active{background:var(--bg);color:var(--lime);border-bottom-color:var(--lime);}
.day-tab div:last-child{font-size:10px;font-weight:400;margin-top:2px;opacity:.7;}

/* CONTENT */
.content{padding:12px 12px 100px;}

/* TIMER BAR */
.timer-bar{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;
}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--lime);letter-spacing:2px;}
.timer-display.urgent{color:var(--red);animation:pulse .5s infinite alternate;}
@keyframes pulse{from{opacity:1}to{opacity:.5}}
.timer-presets{display:flex;gap:6px;}
.timer-preset{
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;
  font-family:'Cairo',sans-serif;transition:all .15s;
}
.timer-preset:hover,.timer-preset.active-preset{background:var(--lime);color:#000;border-color:var(--lime);font-weight:700;}
.timer-btns{display:flex;gap:6px;}
.t-btn{
  padding:6px 14px;border-radius:6px;border:none;cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .15s;
}
.t-btn-start{background:var(--lime);color:#000;}
.t-btn-stop{background:var(--bg3);color:var(--text);border:1px solid var(--border);}

/* WARMUP TOGGLE */
.warmup-toggle{
  width:100%;padding:11px 14px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--bg2);color:var(--text2);cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;margin-bottom:10px;
}
.warmup-toggle.open{color:var(--lime);border-color:rgba(200,241,53,.3);}
.warmup-list{background:var(--bg2);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:4px 0;margin-bottom:10px;}
.warmup-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.warmup-row:last-child{border-bottom:none;}
.warmup-row span:last-child{color:var(--text2);font-size:12px;}

/* EXERCISE CARD */
.ex-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:10px;transition:border-color .3s;
}
.ex-card.completed{border-color:rgba(200,241,53,.4);}
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ex-title-wrap{display:flex;align-items:flex-start;gap:8px;flex:1;}
.ex-num{
  width:26px;height:26px;border-radius:6px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--lime);flex-shrink:0;
}
.ex-name{font-size:14px;font-weight:700;line-height:1.4;color:var(--text);}
.ex-actions{display:flex;gap:6px;flex-shrink:0;margin-right:6px;}
.icon-btn{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.icon-btn:hover{border-color:var(--lime);background:rgba(200,241,53,.1);}
.icon-btn.active{background:rgba(200,241,53,.15);border-color:rgba(200,241,53,.5);}

/* BADGES */
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.b-sets{background:rgba(200,241,53,.12);color:var(--lime);border:1px solid rgba(200,241,53,.2);}
.b-reps{background:rgba(100,200,255,.1);color:#64c8ff;border:1px solid rgba(100,200,255,.2);}
.b-rest{background:rgba(255,140,60,.1);color:#ff8c3c;border:1px solid rgba(255,140,60,.2);}
.b-warm{background:rgba(255,80,80,.1);color:#ff5050;border:1px solid rgba(255,80,80,.2);}

/* NOTE/ALT BOX */
.info-box{border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:12px;line-height:1.7;}
.note-box{background:rgba(255,140,60,.08);border-right:3px solid #ff8c3c;color:#ffb070;}
.alt-box{background:rgba(100,200,255,.08);border-right:3px solid #64c8ff;color:#90d4ff;}
.alt-title{font-weight:700;display:block;margin-bottom:3px;}

/* SETS TABLE */
.sets-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
.sets-table th{
  font-size:11px;color:var(--text2);font-weight:600;
  padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;
}
.sets-table td{padding:6px 4px;text-align:center;}
.set-num{
  width:28px;height:28px;border-radius:6px;background:var(--bg3);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--text2);
}
.set-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-size:13px;padding:7px 4px;text-align:center;
  font-family:'Cairo',sans-serif;outline:none;transition:border-color .15s;
}
.set-input:focus{border-color:var(--lime);}
.set-check{
  width:30px;height:30px;border-radius:50%;border:2px solid var(--border);
  background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .2s;
}
.set-check.done{background:var(--lime);border-color:var(--lime);color:#000;box-shadow:0 0 10px rgba(200,241,53,.4);}

/* NOTES SECTION */
.notes-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;}
.notes-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.notes-textarea{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:13px;padding:10px;font-family:'Cairo',sans-serif;
  resize:none;outline:none;min-height:70px;line-height:1.6;transition:border-color .15s;
}
.notes-textarea:focus{border-color:rgba(200,241,53,.4);}

/* REST DAY */
.rest-day{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:40px 20px;text-align:center;margin-bottom:10px;
}
.rest-icon{font-size:48px;margin-bottom:12px;}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--lime);letter-spacing:2px;margin-bottom:8px;}
.rest-text{color:var(--text2);font-size:13px;line-height:1.7;}

/* SCHEDULE PAGE */
.sched-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 14px;border-radius:10px;margin-bottom:8px;border:1px solid var(--border);
}
.sched-day{font-size:14px;font-weight:700;}
.sched-type{font-size:13px;}
.sched-workout{background:rgba(200,241,53,.08);border-color:rgba(200,241,53,.2);}
.sched-rest{background:var(--bg2);}

/* TIPS PAGE */
.tip-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:14px;display:flex;gap:12px;margin-bottom:10px;
}
.tip-icon{font-size:22px;flex-shrink:0;}
.tip-title{font-size:13px;font-weight:700;color:var(--lime);margin-bottom:4px;}
.tip-text{font-size:12px;color:var(--text2);line-height:1.7;}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,8px);
}
.nav-btn{
  flex:1;background:none;border:none;cursor:pointer;padding:10px 4px 6px;
  border-top:2.5px solid transparent;font-family:'Cairo',sans-serif;
  transition:all .15s;
}
.nav-btn.active{border-top-color:var(--lime);}
.nav-icon{font-size:20px;}
.nav-lbl{font-size:10px;color:var(--text2);margin-top:2px;}
.nav-btn.active .nav-lbl{color:var(--lime);font-weight:700;}

/* OVERLAY */
.overlay{
  position:fixed;inset:0;background:var(--bg);z-index:90;
  overflow-y:auto;padding-bottom:80px;max-width:480px;left:50%;transform:translateX(-50%);
}
.ov-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px;margin-bottom:14px;}
.ov-header h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--lime);}
.ov-header p{font-size:12px;color:var(--text2);margin-top:4px;}
.ov-body{padding:0 12px;}

/* PAGE MAX */
.page-wrap{max-width:480px;margin:0 auto;position:relative;}

/* TIMER MODAL */
.timer-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;}
.timer-modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2rem;width:280px;text-align:center;}
.timer-modal-time{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--lime);line-height:1;letter-spacing:4px;}
.timer-modal-time.urgent{color:var(--red);}
.timer-modal-lbl{font-size:12px;color:var(--text2);margin-bottom:20px;}
.timer-modal-btns{display:flex;gap:10px;justify-content:center;}
.tm-btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;}
.tm-btn-pri{background:var(--lime);color:#000;}
.tm-btn-sec{background:var(--bg3);color:var(--text);border:1px solid var(--border);}

/* HINT */
.hint{font-size:12px;color:var(--text2);margin-bottom:10px;padding:0 2px;}

/* COMPLETE CHECK ON CARD */
.complete-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(200,241,53,.12);border:1px solid rgba(200,241,53,.3);
  border-radius:20px;padding:2px 10px;font-size:11px;color:var(--lime);font-weight:700;
}
</style>
</head>

    </div>
  </div>
</div>

</div><!-- end page-wrap -->

const WARMUP_LIST=[
  {name:"Pallof Press",reps:"10 reps per side"},
  {name:"Pallof Rotation",reps:"10 reps per side"},
  {name:"External Rotation",reps:"10 reps"},
  {name:"Scapula Push Plus",reps:"10 reps"},
];

const SCHEDULE=[
  {day:"السبت",type:"Full Body #1",isRest:false},
  {day:"الأحد",type:"Rest Day",isRest:true},
  {day:"الاثنين",type:"Full Body #2",isRest:false},
  {day:"الثلاثاء",type:"Rest Day",isRest:true},
  {day:"الأربعاء",type:"Full Body #3",isRest:false},
  {day:"الخميس",type:"Rest Day",isRest:true},
  {day:"الجمعة",type:"Rest Day",isRest:true},
];

const TIPS=[
  {icon:"🔥",title:"التسخين",text:"خد بالك من التسخين وافهمه كويس عشان تبقي جاهز وكفاءتك اعلي"},
  {icon:"💪",title:"الفضل العضلي",text:"لو متكنش قادر تأدي التمرين بمدي حركي كامل — مش المفروض تارهق اي ارهاق علي نفسك"},
  {icon:"🎬",title:"فيديوهات التمارين",text:"كل تمرين عنده زرار فيديو — راجعه بين مجاميع الراحه عشان تفهم الحركه"},
  {icon:"⚙️",title:"لا تعدّل البرنامج",text:"متزودش اي شئ من نفسك ولا تعدل حاجه — البرنامج مصمم عمدا كده"},
  {icon:"📅",title:"مدة البرنامج",text:"البرنامج 12 اسبوع من تجربه — لا تعمل اي تعديل سواء عدات او وزن"},
];

// ===================== STATE =====================
let activeDay = 0;
let activeTab = 'workout';
let showWarmup = false;
let openNotes = {};
let openAlts = {};
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerRunning = false;

// Storage helpers
function storGet(k){try{return JSON.parse(sessionStorage.getItem(k))}catch{return null}}
function storSet(k,v){try{sessionStorage.setItem(k,JSON.stringify(v))}catch{}}

// ===================== RENDER =====================
function render(){
  renderTabs();
  renderContent();
  renderProgress();
}

function renderTabs(){
  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = DAYS.map((d,i)=>`
    <button class="day-tab ${activeDay===i?'active':''}" onclick="switchDay(${i})">
      <div>${d.label}</div>
      <div>${d.sub}</div>
    </button>
  `).join('');
}

function renderProgress(){
  const day = DAYS[activeDay];
  let done=0, total=0;
  day.exercises.forEach(ex=>{
    const max = parseInt((ex.sets||'3~5').split('~')[1])||5;
    total += max;
    for(let i=0;i<max;i++){
      const k=`${activeDay}-${ex.id}-s${i}`;
      if(storGet(k+'done')) done++;
    }
  });
  const pct = total>0?Math.round((done/total)*100):0;
  document.getElementById('prog-label').textContent=`${done} من ${total} سيت`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=`${pct}%`;
}

function renderContent(){
  const content = document.getElementById('main-content');
  const day = DAYS[activeDay];

  let html = `
    <!-- TIMER BAR -->
    <div class="timer-bar">
      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">تايمر الراحة</div>
        <div class="timer-presets">
          ${[60,90,120,180,300].map(s=>`<button class="timer-preset" onclick="startTimer(${s})">${s<60?s+'ث':s/60+'د'}</button>`).join('')}
        </div>
      </div>
      <div style="text-align:center">
        <div class="timer-display" id="timer-inline">--:--</div>
      </div>
    </div>

    <!-- WARMUP -->
    <button class="warmup-toggle ${showWarmup?'open':''}" onclick="toggleWarmup()">
      <span>🌡 Warm Up Protocol</span>
      <span style="font-size:11px">${showWarmup?'▲':'▼'}</span>
    </button>
    ${showWarmup?`
    <div class="warmup-list">
      ${WARMUP_LIST.map(w=>`
        <div class="warmup-row"><span>${w.name}</span><span>${w.reps}</span></div>
      `).join('')}
    </div>`:''}

    <p class="hint">${day.exercises.length} تمرين · 💡 ملاحظات · 🔄 بدائل · 🎬 فيديو</p>

    <!-- EXERCISES -->
    ${day.exercises.map((ex,idx)=>renderExCard(ex,idx)).join('')}

    <!-- DAY NOTES -->
    <div class="notes-section">
      <div class="notes-label">📝 ملاحظات اليوم</div>
      <textarea class="notes-textarea" placeholder="مثلاً: شعرت بتعب في الكتف، زودت وزن في السكوات..."
        onchange="saveDayNote(this.value)"
      >${storGet(`day-note-${activeDay}`)||''}</textarea>
    </div>
  `;

  content.innerHTML = html;
}

function renderExCard(ex, idx){
  const dayIdx = activeDay;
  const setsMax = parseInt((ex.sets||'3~5').split('~')[1])||5;
  const noteKey = `note-${dayIdx}-${ex.id}`;
  const altKey = `alt-${dayIdx}-${ex.id}`;
  const showNote = openNotes[noteKey];
  const showAlt = openAlts[altKey];

  // Check if all sets done
  let doneCount=0;
  for(let i=0;i<setsMax;i++){
    if(storGet(`${dayIdx}-${ex.id}-s${i}done`)) doneCount++;
  }
  const isComplete = doneCount >= setsMax;
  const videoUrl = VIDEO_MAP[ex.name] || `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name)}`;

  let setsRows='';
  for(let i=0;i<setsMax;i++){
    const done = storGet(`${dayIdx}-${ex.id}-s${i}done`);
    const wt = storGet(`${dayIdx}-${ex.id}-s${i}wt`)||'';
    const reps = storGet(`${dayIdx}-${ex.id}-s${i}reps`)||'';
    setsRows+=`
      <tr>
        <td><div class="set-num">${i+1}</div></td>
        <td><input type="number" class="set-input" placeholder="0" value="${wt}"
          onchange="saveWt('${dayIdx}','${ex.id}','${i}',this.value)"/></td>
        <td><input type="number" class="set-input" placeholder="0" value="${reps}"
          onchange="saveReps('${dayIdx}','${ex.id}','${i}',this.value)"/></td>
        <td>
          <button class="set-check ${done?'done':''}" onclick="toggleSet('${dayIdx}','${ex.id}','${i}','${setsMax}','${ex.rest}')">
            ${done?'✓':''}
          </button>
        </td>
      </tr>
    `;
  }

  return `
    <div class="ex-card ${isComplete?'completed':''}" id="card-${dayIdx}-${ex.id}">
      <div class="ex-header">
        <div class="ex-title-wrap">
          <div class="ex-num">${idx+1}</div>
          <div class="ex-name">${isComplete?'✅ ':''} ${ex.name}</div>
        </div>
        <div class="ex-actions">
          ${ex.note?`<button class="icon-btn ${showNote?'active':''}" onclick="toggleNote('${noteKey}')">💡</button>`:''}
          ${(ex.alt1||ex.alt2)?`<button class="icon-btn ${showAlt?'active':''}" onclick="toggleAlt('${altKey}')">🔄</button>`:''}
          <a href="${videoUrl}" target="_blank" style="text-decoration:none">
            <button class="icon-btn" style="color:#ff3c3c">🎬</button>
          </a>
        </div>
      </div>

      <div class="badges">
        <span class="badge b-sets">🏋 ${ex.sets} سيت</span>
        <span class="badge b-reps">🔢 ${ex.reps} عده</span>
        <span class="badge b-rest">⏱ ${ex.rest} د</span>
        ${ex.warmup!=='0'?`<span class="badge b-warm">🌡 ${ex.warmup} تسخين</span>`:''}
      </div>

      ${showNote&&ex.note?`<div class="info-box note-box">${ex.note}</div>`:''}
      ${showAlt&&(ex.alt1||ex.alt2)?`
        <div class="info-box alt-box">
          <span class="alt-title">البدائل:</span>
          ${[ex.alt1,ex.alt2].filter(Boolean).map(a=>`• ${a}`).join('  ')}
        </div>`:''}

      <table class="sets-table">
        <thead>
          <tr>
            <th>سيت</th>
            <th>وزن (كجم)</th>
            <th>عدات</th>
            <th>✓</th>
          </tr>
        </thead>
        <tbody>${setsRows}</tbody>
      </table>

      <!-- Per-exercise note -->
      <div style="margin-top:4px">
        <input type="text" class="set-input" style="width:100%;font-size:12px;padding:6px 10px;text-align:right"
          placeholder="ملاحظة على التمرين ده..."
          value="${storGet(`ex-note-${dayIdx}-${ex.id}`)||''}"
          onchange="saveExNote('${dayIdx}','${ex.id}',this.value)"/>
      </div>
    </div>
  `;
}

// ===================== ACTIONS =====================
function switchDay(i){activeDay=i;openNotes={};openAlts={};render();}
function toggleWarmup(){showWarmup=!showWarmup;renderContent();}
function toggleNote(k){openNotes[k]=!openNotes[k];renderContent();}
function toggleAlt(k){openAlts[k]=!openAlts[k];renderContent();}

function saveWt(d,id,i,v){storSet(`${d}-${id}-s${i}wt`,v);}
function saveReps(d,id,i,v){storSet(`${d}-${id}-s${i}reps`,v);}
function saveExNote(d,id,v){storSet(`ex-note-${d}-${id}`,v);}
function saveDayNote(v){storSet(`day-note-${activeDay}`,v);}

function toggleSet(d,id,i,max,rest){
  const k=`${d}-${id}-s${i}done`;
  const wasDone=storGet(k);
  storSet(k,!wasDone);
  if(!wasDone){
    const restSecs=parseInt((rest||'3~5').split('~')[0])*60;
    startTimer(restSecs||180);
  }
  renderContent();
  renderProgress();
}

// ===================== TIMER =====================
function startTimer(secs){
  clearInterval(timerInterval);
  timerRemaining=secs;
  timerTotal=secs;
  timerRunning=true;
  document.getElementById('timer-modal').style.display='flex';
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    if(timerRemaining>0){
      timerRemaining--;
      updateTimerDisplay();
    } else {
      clearInterval(timerInterval);
      timerRunning=false;
    }
  },1000);
}

function updateTimerDisplay(){
  const m=String(Math.floor(timerRemaining/60)).padStart(2,'0');
  const s=String(timerRemaining%60).padStart(2,'0');
  const txt=`${m}:${s}`;
  const modalEl=document.getElementById('modal-time');
  const inlineEl=document.getElementById('timer-inline');
  if(modalEl){
    modalEl.textContent=txt;
    modalEl.className='timer-modal-time'+(timerRemaining<=10?' urgent':'');
  }
  if(inlineEl) inlineEl.textContent=txt;
  const pct=timerTotal>0?((timerTotal-timerRemaining)/timerTotal)*120:0;
  const prog=document.getElementById('modal-prog');
  if(prog) prog.setAttribute('width',pct);
}

function toggleModal(){
  if(timerRunning){
    clearInterval(timerInterval);
    timerRunning=false;
  } else {
    timerRunning=true;
    timerInterval=setInterval(()=>{
      if(timerRemaining>0){timerRemaining--;updateTimerDisplay();}
      else{clearInterval(timerInterval);timerRunning=false;}
    },1000);
  }
}

function closeTimer(){
  clearInterval(timerInterval);
  timerRunning=false;
  document.getElementById('timer-modal').style.display='none';
}

// ===================== TABS =====================
function setTab(t){
  activeTab=t;
  document.getElementById('main-header').style.display= t==='workout'?'block':'none';
  document.getElementById('main-content').style.display= t==='workout'?'block':'none';
  document.getElementById('overlay-schedule').style.display= t==='schedule'?'block':'none';
  document.getElementById('overlay-tips').style.display= t==='tips'?'block':'none';
  ['workout','schedule','tips'].forEach(x=>{
    document.getElementById(`nav-${x}`).className='nav-btn'+(t===x?' active':'');
  });
  if(t==='schedule') renderSchedule();
  if(t==='tips') renderTips();
}

function renderSchedule(){
  document.getElementById('sched-body').innerHTML=SCHEDULE.map(s=>`
    <div class="sched-row ${s.isRest?'sched-rest':'sched-workout'}">
      <span class="sched-day">${s.day}</span>
      <span class="sched-type" style="color:${s.isRest?'var(--text2)':'var(--lime)'}">${s.type}</span>
    </div>
  `).join('');
}

function renderTips(){
  document.getElementById('tips-body').innerHTML=TIPS.map(t=>`
    <div class="tip-card">
      <span class="tip-icon">${t.icon}</span>
      <div><div class="tip-title">${t.title}</div><div class="tip-text">${t.text}</div></div>
    </div>
  `).join('');
}

// ===================== INIT =====================
render();
</script>
